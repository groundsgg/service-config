# gRPC Server
quarkus.grpc.server.use-separate-server=false
quarkus.http.host=0.0.0.0
quarkus.http.port=9000
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}

# Proto Generation
quarkus.generate-code.grpc.scan-for-proto=gg.grounds:library-grpc-contracts-config

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/app?currentSchema=config}
quarkus.datasource.username=${POSTGRES_USER:app}
quarkus.datasource.password=${POSTGRES_PASSWORD:app}
quarkus.flyway.schemas=config
quarkus.flyway.create-schemas=true
quarkus.flyway.migrate-at-start=true

# NATS
nats.url=${NATS_URL:nats://localhost:4222}
nats.max-reconnects=${NATS_MAX_RECONNECTS:-1}
nats.reconnect-wait-seconds=${NATS_RECONNECT_WAIT_SECONDS:2}

# JWT validation for incoming gRPC calls (v2.2 Service Architecture).
# Verifies every Bearer token against the configured JWKS endpoint
# (k8s API-server by default) and enforces audience = grounds-services.
# Disable for local quarkusDev where no projected SA-Token is mounted.
grounds.auth.enabled=${GROUNDS_AUTH_ENABLED:true}
grounds.auth.jwks-url=${GROUNDS_AUTH_JWKS_URL:https://kubernetes.default.svc/openid/v1/jwks}
grounds.auth.expected-audience=${GROUNDS_AUTH_AUDIENCE:grounds-services}
